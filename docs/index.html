<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AUX AC 云遥控</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f6f8;
      --panel: #fff;
      --text: #111827;
      --muted: #667085;
      --border: #d7dce2;
      --green: #087443;
      --red: #b42318;
      --blue: #175cd3;
      --amber: #b54708;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(620px, 100%);
      margin: 0 auto;
      padding: 24px 16px 36px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 25px;
      font-weight: 700;
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 16px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      min-height: 52px;
      border: 0;
      border-radius: 8px;
      padding: 0 22px;
      color: white;
      font: inherit;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:active { opacity: .7; }
    .on { background: var(--green); }
    .off { background: var(--red); }
    .conn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .conn-dot.online { background: var(--green); }
    .status {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 6px 12px;
      margin-top: 12px;
      font-size: 15px;
    }
    .status dt {
      color: var(--muted);
      margin: 0;
    }
    .status dd {
      margin: 0;
      word-break: break-word;
    }
    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #eef1f5;
      border-radius: 6px;
      padding: 12px;
      margin: 12px 0 0;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main>
    <h1>AUX 空调云遥控</h1>
    <div class="sub">MQTT · EMQX 中国节点 · 延迟 &lt;1s</div>

    <section>
      <div class="row">
        <button class="on" id="btnOn">开机</button>
        <button class="off" id="btnOff">关机</button>
      </div>
      <div class="conn" id="conn">
        <span class="conn-dot" id="dot"></span>
        <span id="connText">连接中…</span>
      </div>
      <dl class="status">
        <dt>空调状态</dt><dd id="power">---</dd>
        <dt>最后命令</dt><dd id="lastCommand">-</dd>
        <dt>在线</dt><dd id="online">-</dd>
        <dt>Wi-Fi RSSI</dt><dd id="rssi">-</dd>
        <dt>IP</dt><dd id="ip">-</dd>
        <dt>运行时长</dt><dd id="uptime">-</dd>
        <dt>错误</dt><dd id="lastError">-</dd>
      </dl>
      <pre id="raw"></pre>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/mqtt@5/dist/mqtt.min.js"></script>
  <script>
    const BROKER = 'wss://broker-cn.emqx.io:8084/mqtt';
    const TOPIC_CMD = 'rubia/aux_ac/command';
    const TOPIC_STAT = 'rubia/aux_ac/status';

    const $dot = document.getElementById('dot');
    const $conn = document.getElementById('connText');
    const $power = document.getElementById('power');
    const $raw = document.getElementById('raw');

    function setConn(text, cls) {
      $conn.textContent = text;
      $dot.className = 'conn-dot ' + (cls || '');
    }

    function uptime(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      const d = Math.floor(h / 24);
      if (d) return `${d}d ${h % 24}h`;
      if (h) return `${h}h ${m % 60}m`;
      return `${m}m ${s % 60}s`;
    }

    function render(data) {
      $power.textContent = (data.power === 'on') ? '🟢 开机' : (data.power === 'off') ? '🔴 关机' : data.power || '---';
      document.getElementById('lastCommand').textContent = data.last_command || '-';
      document.getElementById('online').textContent = data.online ? '✅ 在线' : '❌ 离线';
      document.getElementById('rssi').textContent = data.wifi_rssi != null ? data.wifi_rssi + ' dBm' : '-';
      document.getElementById('ip').textContent = data.ip || '-';
      document.getElementById('uptime').textContent = data.uptime_ms ? uptime(data.uptime_ms) : '-';
      document.getElementById('lastError').textContent = data.last_error || '-';
      $raw.textContent = JSON.stringify(data, null, 2);
    }

    const client = mqtt.connect(BROKER, {
      clientId: 'rubia_web_' + Math.random().toString(16).slice(2, 8),
      clean: true,
      reconnectPeriod: 3000,
      connectTimeout: 8000
    });

    client.on('connect', () => {
      setConn('已连接 EMQX', 'online');
      client.subscribe(TOPIC_STAT, (err) => {
        if (!err) setConn('已连接 · 监听中', 'online');
      });
    });

    client.on('message', (topic, msg) => {
      try { render(JSON.parse(msg.toString())); } catch (e) {}
    });

    client.on('error', () => setConn('连接失败，重试中…', ''));
    client.on('close', () => setConn('断开，重连中…', ''));
    client.on('reconnect', () => setConn('重连中…', ''));

    function sendCmd(cmd) {
      client.publish(TOPIC_CMD, cmd, { qos: 1 });
    }

    document.getElementById('btnOn').addEventListener('click', () => sendCmd('on'));
    document.getElementById('btnOff').addEventListener('click', () => sendCmd('off'));
  </script>
</body>
</html>
